<app-header title="Target Points"></app-header>

<div class="target-points-page mt-5">
  <!-- TOP ACTION + FILTERS -->

  <div class="top-bar">
    <div class="top-controls">
      <!-- CREATE BUTTON -->

      <!-- <button
        class="btn btn-success create-btn"
        routerLink="/project-target-point-form"
      >
        + Create Target Point
      </button> -->

      <!-- FILTERS -->

      <div class="filters-wrapper">
        <!-- SEARCH TEAM -->

        <input
          type="text"
          class="filter-input"
          placeholder="Search Team Name..."
          [(ngModel)]="searchText"
          (input)="applyFilters()"
        />

        <!-- MONTH -->

        <select
          class="filter-input"
          [(ngModel)]="selectedMonth"
          (change)="applyFilters()"
        >
          <option value="">All Months</option>

          <option *ngFor="let month of months" [value]="month">
            {{ month }}
          </option>
        </select>

        <!-- YEAR -->

        <select
          class="filter-input"
          [(ngModel)]="selectedYear"
          (change)="applyFilters()"
        >
          <option value="">All Years</option>

          <option *ngFor="let year of years" [value]="year">
            {{ year }}
          </option>
        </select>

        <!-- RESET -->

        <button class="btn reset-btn" (click)="resetFilters()">Reset</button>
      </div>
    </div>

    <!-- TABLE -->

    <div class="table-card">
      <div class="table-responsive">
        <table class="table custom-table">
          <thead>
            <tr>
              <th>Sr No</th>
              <th>Team Name</th>
              <th>Points</th>
              <th>Created Date</th>
              <th width="220">Action</th>
            </tr>
          </thead>

          <tbody *ngFor="let group of groupedTargetPoints">
            <!-- MONTH ROW -->

            <tr class="month-row">
              <td colspan="5">
                <div class="month-total-row">
                  <div class="month-title">
                    {{ group.month }}
                  </div>

                  <div class="month-points">
                    Total Points :
                    <span>{{ group.totalPoints }}</span>
                  </div>
                </div>
              </td>
            </tr>

            <!-- DATA ROWS -->

            <tr *ngFor="let item of group.items; let i = index">
              <td>
                {{ i + 1 }}
              </td>

              <!-- TEAM -->

              <td>
                <span *ngIf="editId !== item.id">
                  {{ item.teamName }}
                </span>

                <span>
                  {{ item.teamName }}
                </span>
              </td>

              <!-- POINTS -->

              <td>
                <span *ngIf="editId !== item.id">
                  {{ item.points }}
                </span>

                <input
                  *ngIf="editId === item.id"
                  type="number"
                  class="modern-input"
                  [(ngModel)]="item.points"
                />
              </td>

              <!-- DATE -->

              <td>
                {{ item.created | date: "dd MMM yyyy" }}
              </td>

              <!-- ACTION -->

              <td>
                <div class="action-buttons">
                  <button
                    *ngIf="editId !== item.id"
                    class="btn edit-btn"
                    (click)="editId = item.id"
                  >
                    Edit
                  </button>

                  <button
                    *ngIf="editId === item.id"
                    class="btn save-btn"
                    (click)="update(item)"
                  >
                    Save
                  </button>

                  <button
                    *ngIf="editId === item.id"
                    class="btn cancel-btn"
                    (click)="cancelEdit()"
                  >
                    Cancel
                  </button>

                  <!-- <button class="btn delete-btn" (click)="delete(item.id)">
                    Delete
                  </button> -->
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
