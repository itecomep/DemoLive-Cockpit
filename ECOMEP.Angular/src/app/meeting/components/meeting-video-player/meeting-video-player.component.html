<div class="meeting-video-wrapper" [ngClass]="{'meeting-video-wrapper-cover':fit=='cover'}">
  <video id="video1" *ngIf="url && autoplay && showControls" autoplay controls #resetVideo>
    <source src="{{url}}" type="video/mp4">
  </video>
  <video id="video1" *ngIf="url && !autoplay && showControls" controls>
    <source src="{{url}}" type="video/mp4">
  </video>
  <video id="video1" *ngIf="url && autoplay && !showControls" autoplay>
    <source src="{{url}}" type="video/mp4">
  </video>
  <video id="video1" *ngIf="url && !autoplay && !showControls">
    <source src="{{url}}" type="video/mp4">
  </video>
</div>
