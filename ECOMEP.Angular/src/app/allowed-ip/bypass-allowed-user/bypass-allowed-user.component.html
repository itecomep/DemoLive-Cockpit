<div class="page-wrapper">\
<app-header [title]="headerTitle" [titleCount]="headerTitleCount"></app-header>
  <div class="container-fluid">
    <div class="top-bar">
      <div class="top-bar-inner">
        <button mat-icon-button color="primary" (click)="goBack()">
            <mat-icon>arrow_back</mat-icon>
        </button>
        <mat-form-field appearance="outline" class="search-field">
          <mat-label>Search Username</mat-label>
          <input
            matInput
            placeholder="Enter username to search"
            [formControl]="searchFilter">
          <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>
      </div>
      <div class="action-group">
        <button mat-raised-button color="primary" (click)="refresh()">
          Refresh
        </button>
        <button mat-raised-button color="accent" (click)="openAddBypassUserDialog()">
          Add User
        </button>
      </div>
    </div>
    <table
      mat-table
      [dataSource]="filteredUsers"
      class="mat-elevation-z2 ip-table"
      style="width:100%">

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef class="col-id">ID</th>
        <td mat-cell *matCellDef="let user" class="col-id" style="font-size:16px">
          {{ user.id }}
        </td>
      </ng-container>

      <ng-container matColumnDef="username">
        <th mat-header-cell *matHeaderCellDef>Username</th>
        <td mat-cell *matCellDef="let user" style="font-size:16px">
          {{ user.username }}
        </td>
      </ng-container>

      <ng-container matColumnDef="isActive">
        <th mat-header-cell *matHeaderCellDef class="col-center">Active</th>
        <td mat-cell *matCellDef="let user" class="col-center" style="font-size:16px">
          {{ user.isActive ? 'Yes' : 'No' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef class="col-center">Action</th>
        <td mat-cell *matCellDef="let user" class="col-center">
          <button
            mat-icon-button
            color="warn"
            (click)="deleteUser(user.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <div *ngIf="filteredUsers.length === 0" class="empty-text">
      No bypass users found.
    </div>

  </div>
</div>
