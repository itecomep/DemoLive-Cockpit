<div class="mat-dialog-header mcv-dialog-header">
    <h5 class="font-focused">{{data.dialogTitle}}</h5>
    <button mat-icon-button aria-label="close" (click)="onClose(null)">
        <mat-icon>close</mat-icon>
    </button>
</div>
<mat-dialog-content>
    <app-leave [config]="data" (create)="onClose($event)" (cancel)="onClose($event)" (update)="onClose($event)"
        (delete)="onClose($event)" *ngIf="data && !data.isCreateMode"></app-leave>
</mat-dialog-content>
