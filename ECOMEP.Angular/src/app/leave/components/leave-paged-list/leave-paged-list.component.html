<ul class="agile-list">
    <li *ngFor="let item of dataList; let i = index;" [routerLinkActive]="['active']">
          <img src="{{ item.contact?.photoUrl || 'assets/images/user.png'}}" alt="" [matTooltip]="item.contact.name ?? ''"
          (click)="openPhotoDialog(item.contact); $event.stopPropagation()" style="cursor: pointer;"
            class="user-thumbnail float-left mr-2">
        <a [routerLink]="[pagedListConfig.route,item.id]">
            <app-leave-list-item [item]="item" [index]="i" [showAll]="pagedListConfig.showAll" [monthlySummary]="getCurrentMonthSummary()" [allLeaves]="dataList"></app-leave-list-item>
        </a>
    </li>

    <li *ngIf="!isLoading && dataList.length == 0">
        <div class="row">
            <div class="col-12">
                <span>No items found</span>
            </div>
        </div>
    </li>

    <li *ngIf="!isLoading && totalRecordsCount > 0 && pagedListConfig.pageSize + 1 < totalPages"
        (click)="loadMoreRecords()" class="text-center">
        <div class="row">
            <div class="col-12">
                <span style="cursor:pointer;">Show More</span>
            </div>
        </div>
    </li>
</ul>
