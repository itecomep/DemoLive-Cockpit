<div class="mat-dialog-header mcv-dialog-header">
  <h5 class="font-focused">{{data.dialogTitle}}</h5>
  <button mat-icon-button aria-label="close" (click)="onClose(null)"><mat-icon>close</mat-icon></button>
</div>
<mat-dialog-content>

  <app-wf-task-assessment [wfTaskID]="data.wfTaskID" [saveButtonText]="data.saveButtonText"
    [saveButtonTooltip]="data.saveButtonTooltip" (cancel)="onClose($event)" (update)="onClose($event)"
    *ngIf="data"></app-wf-task-assessment>
</mat-dialog-content>
