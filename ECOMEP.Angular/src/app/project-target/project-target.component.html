<app-header title="Project Target"></app-header>

<div class="page-wrapper">

  <!-- TOP ACTION BAR -->
  <div class="page-actions">
    <button class="primary-btn" (click)="openForm()">
      + Create Target
    </button>
  </div>

  <!-- CARD -->
  <div class="card">

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Project</th>
            <th>Stage</th>
            <th>Status</th>
            <th>Target Date</th>
            <th>Feedback</th>
            <th class="action-col">Action</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let t of targets; trackBy: trackById">

            <td class="id-badge">#{{ t.id }}</td>

            <td>{{ getProjectName(t.projectId) }}</td>

            <td>
              <ng-container *ngIf="editId !== t.id; else editStage">
                {{ t.stage }}
              </ng-container>

              <ng-template #editStage>
                <mat-form-field appearance="outline">
                  <mat-select [(ngModel)]="editRow.stage">
                    <mat-option *ngFor="let s of stages" [value]="s.title">
                      {{ s.title }}
                    </mat-option>
                  </mat-select>
                </mat-form-field>
              </ng-template>
            </td>

            <td>
              <ng-container *ngIf="editId !== t.id; else editStatus">
                <span class="status-badge" [ngClass]="getStatusClass(t.stageStatus)">
                  {{ t.stageStatus }}
                </span>
              </ng-container>

              <ng-template #editStatus>
                <mat-form-field appearance="outline">
                  <mat-select [(ngModel)]="editRow.stageStatus">
                    <mat-option *ngFor="let s of statuses" [value]="s">
                      {{ s }}
                    </mat-option>
                  </mat-select>
                </mat-form-field>
              </ng-template>
            </td>

            <td>
              <ng-container *ngIf="editId !== t.id; else editDate">
                <span [ngClass]="{ 'expired': isExpired(t.targetDate) }">
                  {{ t.targetDate | date: 'dd MMM yyyy' }}
                </span>
              </ng-container>

              <ng-template #editDate>
                <input type="date" [(ngModel)]="editRow.targetDate" />
              </ng-template>
            </td>

            <td>
              <ng-container *ngIf="editId !== t.id; else editFeedback">
                {{ t.feedback || '-' }}
              </ng-container>

              <ng-template #editFeedback>
                <input type="text" [(ngModel)]="editRow.feedback" />
              </ng-template>
            </td>

            <td class="actions">

              <ng-container *ngIf="editId !== t.id; else editActions">
                <button class="edit-btn" (click)="startEdit(t)">Edit</button>
                <!-- <button class="delete-btn" (click)="delete(t.id)">Delete</button> -->
              </ng-container>

              <ng-template #editActions>
                <button class="primary-btn" (click)="saveEdit()">Save</button>
                <button class="secondary-btn" (click)="cancelEdit()">Cancel</button>
              </ng-template>

            </td>

          </tr>

          <tr *ngIf="targets.length === 0">
            <td colspan="7" class="no-data">
              No history records found
            </td>
          </tr>
        </tbody>

      </table>
    </div>

  </div>
</div>
