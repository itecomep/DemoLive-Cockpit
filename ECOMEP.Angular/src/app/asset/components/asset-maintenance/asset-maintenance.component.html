<div class="asset-maintenance-wrapper">
    <table>
        <thead>
            <tr>
                <th>Asset</th>
                <th>Maintenance Date</th>
                <th>Action By</th>
                <th>Action On</th>
                <th>Resolution Message</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <ng-container *ngFor="let item of dataList">
                <tr (click)="onUpdateMaintenance(item)">
                    <td>{{item.title}}</td>
                    <td>{{item.nextScheduleDate | date:'dd MMM y'}}</td>
                    <td>
                        <span *ngIf="item.statusFlag !== ASSET_SCHEDULE_ISSUE_PENDING">{{item.modifiedBy}}</span>
                    </td>
                    <td>
                        <span *ngIf="item.statusFlag !== ASSET_SCHEDULE_ISSUE_PENDING">
                            {{item.modified | date:'dd MMM y'}}</span>
                    </td>
                    <td>{{item.resolutionMessage}}</td>
                    <td>
                        <mat-icon class="pending" matTooltip="Pending"
                            *ngIf="item.statusFlag == ASSET_SCHEDULE_ISSUE_PENDING">help</mat-icon>
                        <mat-icon class="approved" matTooltip="Completed"
                            *ngIf="item.statusFlag == ASSET_SCHEDULE_ISSUE_APPROVED">done</mat-icon>
                        <mat-icon class="verified" matTooltip="Verified"
                            *ngIf="item.statusFlag == ASSET_SCHEDULE_ISSUE_VERIFIED">done_all</mat-icon>
                    </td>
                </tr>
            </ng-container>
        </tbody>
    </table>
</div>
<app-footer>
    <div class="mcv-footer-actions">
        <div class="search-filter">
            <mat-icon matPrefix>search</mat-icon>
            <input aria-label="Enter project name and select" [formControl]="searchFC" matInput />
        </div>
        <div>
            <mat-form-field  class="footer-form-field" appearance="outline">
                <mat-select [formControl]="statusFC" multiple placeholder="Status">
                    <mat-option *ngFor="let item of statusOptions" [value]="item.value">{{item.label}}</mat-option>
                </mat-select>
            </mat-form-field>
        </div>
        <mat-paginator [length]="dataList.length - 1" [pageIndex]="pagedListConfig.pageIndex" [hidePageSize]="true"
            [pageSize]="pagedListConfig.pageSize" (page)="handlePageEvent($event)" aria-label="Select page">
        </mat-paginator>
    </div>
    
    <div class="mcv-footer-mobile-actions">
        <button mat-icon-button appFilterToggle matTooltip="Filters" aria-label="Filters">
            <mat-icon>filter_list</mat-icon>
        </button>

        <mat-paginator [length]="totalRecordsCount" [pageIndex]="pagedListConfig.pageIndex" [hidePageSize]="true"
            [pageSize]="pagedListConfig.pageSize" (page)="handlePageEvent($event)" aria-label="Select page">
        </mat-paginator>
        
    </div>

    <div class="mcv-footer-filters">
      <div class="inline-list">
        <div *ngIf="statusOptions && statusOptions.length > 0">
          <mat-form-field appearance="outline">
            <mat-label>Status</mat-label>
            <mat-select [formControl]="statusFC" multiple placeholder="Status">
              <mat-option *ngFor="let item of statusOptions" [value]="item.value">{{item.label}}</mat-option>
            </mat-select>
          </mat-form-field>
        </div>
      </div>
      <div class="search-filter">
        <mat-icon matPrefix>search</mat-icon>
        <input aria-label="Enter project name and select" [formControl]="searchFC" matInput />
      </div>
    </div>

</app-footer>
