  <div class="mcv-dialog-header">
    <div class="header-title-group">
      <div class="icon-circle">
        <mat-icon>home_work</mat-icon>
      </div>
      <h5 class="font-focused">Work From Home Request</h5>
    </div>

    <div class="header-actions">
      <button mat-button class="close-btn" (click)="onClose()">
        <mat-icon>close</mat-icon>
      </button>
    </div>
  </div>

  <mat-dialog-content>
    <form class="leave-create-wrapper" [formGroup]="form">
      <div class="card-section">
        <h6 class="section-title">REQUEST SETTINGS</h6>

        <!-- ✅ HR USER -->
<mat-form-field appearance="outline" class="full-width" *ngIf="canSelectUser">
  <mat-label>Application User</mat-label>

  <input
    matInput
    formControlName="applicationUser"
    [matAutocomplete]="autoUser"
    placeholder="Select user"
  />

  <mat-autocomplete #autoUser="matAutocomplete" [displayWith]="displayFnContact">
    <mat-option *ngFor="let option of filteredContacts$ | async" [value]="option">
      {{ option.name }}
    </mat-option>
  </mat-autocomplete>

  <mat-icon matSuffix>person</mat-icon>
</mat-form-field>

        <div class="grid-layout mt-2">
          <div class="date-range-group">
            <mat-form-field appearance="outline">
              <mat-label>From Date</mat-label>
              <input
                matInput
                formControlName="startDate"
                [matDatepicker]="startPicker"
                readonly
              />
              <mat-datepicker-toggle
                matSuffix
                [for]="startPicker"
              ></mat-datepicker-toggle>
              <mat-datepicker #startPicker></mat-datepicker>
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>To Date</mat-label>
              <input
                matInput
                formControlName="endDate"
                [matDatepicker]="endPicker"
                readonly
              />
              <mat-datepicker-toggle
                matSuffix
                [for]="endPicker"
              ></mat-datepicker-toggle>
              <mat-datepicker #endPicker></mat-datepicker>
            </mat-form-field>
          </div>
        </div>
      </div>

      <div class="card-section">
        <h6 class="section-title">Reason</h6>

        <mat-form-field appearance="outline" class="full">
          <mat-label>Reason for request</mat-label>

          <textarea
            matInput
            formControlName="reason"
            cdkTextareaAutosize
            cdkAutosizeMinRows="3"
          ></textarea>
        </mat-form-field>
      </div>

      <div class="card-section">
        <div class="section-header">
          <h6 class="section-title">ATTACHMENTS</h6>
          <span class="badge" *ngIf="selectedFiles.length">
            {{ selectedFiles.length }} Files
          </span>
        </div>

        <div class="upload-zone">
          <input
            type="file"
            multiple
            (change)="onFileSelected($event)"
            class="file-input"
          />
        </div>

        <div class="file-grid" *ngIf="selectedFiles.length">
          <div class="file-item" *ngFor="let file of selectedFiles">
            <mcv-file
              [filename]="file.name"
              [showRemove]="allowEdit"
              (delete)="onDeleteAttachment(file)"
            >
            </mcv-file>
          </div>
        </div>
      </div>
    </form>
  </mat-dialog-content>

  <div class="mat-dialog-actions modern-actions">
    <button mat-button color="warn" (click)="onClose()">Cancel</button>

    <button
      mat-raised-button
      color="primary"
      [disabled]="form.invalid"
      (click)="onSubmit()"
    >
      <mat-icon>check</mat-icon>
      Submit Request
    </button>
  </div>
</div>
