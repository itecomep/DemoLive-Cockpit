<div class="mat-dialog-header mcv-dialog-header">
    <h5 class="font-focused">Contact Documents Category</h5>
    <div class="d-flex align-items-center">
        <button mat-icon-button (click)="onSubmit()">
            <mat-icon>done</mat-icon>
        </button>
        <button mat-icon-button aria-label="close" (click)="onClose()">
            <mat-icon>close</mat-icon>
        </button>
    </div>
</div>
<mat-dialog-content>
    <div class="form-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Sr No.</th>
                    <th>Category</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <ng-container *ngFor="let item of categoryOptions;let i = index">
                    <tr>
                        <td> {{i + 1}}</td>
                        <td>
                            <div class="cell-content">
                                <div class="cell-input">
                                    <form>
                                        <input matInput (input)="onInput(fa,i)"
                                            [formControl]="getFormControl(fa,i,'category')">
                                    </form>
                                </div>
                            </div>
                        </td>
                        <td>
                            <mat-icon (click)="onDeleteCategory(item,i)">clear</mat-icon>
                        </td>
                    </tr>
                </ng-container>
                <tr>
                    <td colspan="3" (click)="onAddCategory()">
                        <mat-icon>add</mat-icon>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</mat-dialog-content>
