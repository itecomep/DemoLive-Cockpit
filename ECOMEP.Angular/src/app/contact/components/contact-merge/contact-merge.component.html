                Person
            </mat-radio-button>
            <mat-radio-button [value]="true">

    <button mat-raised-button aria-label="Merge & Save" (click)="onSubmit()" [disabled]="selected.length == 0">Merge &
        Save</button>
</ng-template>

<div class="mat-dialog-header contact-create-dialog-header">
    <h5 class="contact-create-dialog-header-title">{{dialogTitle}}</h5>
    <div class="contact-create-dialog-header-actions theme-dark">
        <ng-container *ngTemplateOutlet="headerActionTemplate"></ng-container>
    </div>
    <button mat-icon-button aria-label="close" (click)="onClose(null)">
        <mat-icon>close</mat-icon>
    </button>
</div>
<div class="contact-create-dialog-mobile-actions">
    <ng-container *ngTemplateOutlet="headerActionTemplate"></ng-container>
</div>
<mat-dialog-content>
    <div class="duplicate-contacts">
        <h5 class="font-focused">Duplicate Contacts ({{contactList.length}})</h5>
        <ul class="duplicate-contact-list">
            <li *ngFor="let item of contactList">
                <div class="contact-list-item">
                    <div class="list-item-details">
                        <img class="contact-icon" src="{{ item.photoUrl || 'assets/images/person-icon.svg' }}" alt=""
                            *ngIf="!item.isCompany" />
                        <img class="contact-icon" src="{{ item.photoUrl || 'assets/images/company-icon.svg' }}" alt=""
                            *ngIf="item.isCompany" />

                        <div>
                            <h6 class="font-focused">{{item.name}}</h6>
                            <div class="category-list">
                                <span *ngFor="let category of item.categories" class="category-tag">{{category}}
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="list-item-actions">
                        <mat-checkbox [checked]="getIsMerged(item)" (change)="onSelect(item)"></mat-checkbox>
                        <button mat-icon-button (click)="openContactDetails(item)" matTooltip="view details"
                            aria-label="view details"><mat-icon>info</mat-icon></button>
                        <!-- <button mat-icon-button (click)="onMerge(item)" matTooltip="merge" aria-label="merge"
                            [disabled]="getIsMerged(item)">
                            <mat-icon>merge</mat-icon>
                        </button>
     -->
                    </div>
                </div>
            </li>
        </ul>
    </div>
</mat-dialog-content>
