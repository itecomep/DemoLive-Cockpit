<div class="mat-dialog-header mcv-dialog-header">
  <h5 class="font-focused">Reset Password</h5>
  <button mat-icon-button aria-label="close" (click)="onCancelButtonClicked()">
    <mat-icon>close</mat-icon>
  </button>
</div>
<mat-dialog-content>
  <div class="p-1">
    <form [formGroup]="form" autocomplete="off">


      <!-- Password -->
      <div>
        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input type="password" placeholder="Password" aria-label="Password" matInput formControlName="password" />

          <mat-error>{{
            utilityService.getErrorMessage(f.password)
            }}</mat-error>
        </mat-form-field>
      </div>
      <!--Password ends-->

      <!-- Confirm password -->
      <div>
        <mat-form-field appearance="outline">
          <mat-label>Confirm Password</mat-label>
          <input type="password" placeholder="Confirm Password" aria-label="Confirm Password" matInput
            formControlName="confirmPassword" />

          <mat-error>{{
            utilityService.getErrorMessage(f.confirmPassword)
            }}</mat-error>
        </mat-form-field>
      </div>
      <!--Confirm password ends-->

      <!--Force password change-->
      <div>
        <mat-checkbox [checked]="true" formControlName="chkPasswordChange">User must change password on login
        </mat-checkbox>
      </div>
      <!--Force password change ends-->
    </form>
  </div>
  <!--Buttons row-->
  <div class="mcv-dialog-actions">
    <div class="row">
      <div class="col-sm-12">

        <button mat-raised-button color="primary" class=" ml-2 float-right" matTooltip="Save" aria-label="Save"
          (click)="onSaveButtonClicked()">Save</button>
      </div>
    </div>
  </div>
</mat-dialog-content>
