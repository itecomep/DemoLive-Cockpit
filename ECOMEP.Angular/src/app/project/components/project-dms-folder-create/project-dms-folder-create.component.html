<div class="mat-dialog-header project-dms-folder-create-dialog-header">
    <h5 class="project-dms-folder-create-dialog-header-title">{{currentItem ? 'Edit Folder' : 'New Folder'}}</h5>
    <div class="d-flex align-items-center">
      <button mat-raised-button aria-label="close" (click)="onSubmit()" >
        Save
      </button>
      <button mat-icon-button aria-label="close" (click)="onClose()">
        <mat-icon>close</mat-icon>
      </button>
    </div>
  </div>
  <mat-dialog-content>
<div class="project-dms-folder-create-wrapper">
    <form [formGroup]="form" autocomplete="off">
        <div class="row m-0">
            <mat-form-field appearance="outline" class="col-md-12">
                <mat-label>Folder Name</mat-label>
                <input placeholder="Folder Name" aria-label="Folder Name" matInput formControlName="filename" />
                <mat-error>{{ getErrorMessage(f.filename) }}</mat-error>
            </mat-form-field>
        </div>
    </form>
</div>
</mat-dialog-content>
