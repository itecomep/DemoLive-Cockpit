<ul class="project-association-list">
    <li *ngIf="!isReadOnly">
        <form [formGroup]="form" autocomplete="off">

            <div class="row m-0">
       
                
                <mat-form-field appearance="outline" class="col-md-12">
                    <mat-label>Select Contact</mat-label>
                    <input placeholder="Enter name of contact to select from the list" aria-label="Select Contact"
                        matInput formControlName="contact" [matAutocomplete]="autoContact" />
                    <mat-autocomplete #autoContact="matAutocomplete" [displayWith]="displayFnContact">
                        <mat-option *ngFor="let option of filteredContacts$ | async" [value]="option">
                            {{ option.name }}
                        </mat-option>
                    </mat-autocomplete>
                    <span matSuffix>
                        <mat-icon>person</mat-icon>
                    </span>
                    <mat-error>{{ getErrorMessage(f.contact) }}</mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" class="col-md-12">
                    <mat-label>Group</mat-label>
                    <mat-select placeholder="Select Group" aria-label="Group" matInput formControlName="title" >
                      <mat-option *ngFor="let item of groupOptions" [value]="item">
                        {{ item }}
                      </mat-option>
                     </mat-select>
                    <mat-error>{{ getErrorMessage(f.title) }}
                    </mat-error>
                  </mat-form-field>
            </div>
            <div class="d-flex align-items-center justify-content-end">
                <button mat-raised-button color="accent" aria-label="Add" (click)="onCreateAssociate()" [disabled]="!form.valid">Add</button>
            </div>

        </form>
    </li>
    <li *ngFor="let item of associations; let i=index">
        <div class="d-flex justify-content-between">
            <div class="d-flex">
                <div class="flex-grow-0 flex-shrink-0">
                    <img src="{{ item.contact.photoUrl || 'assets/images/person-icon.svg' }}"
                        class="user-thumbnail float-left mr-2" alt="" *ngIf="!item.contact.isCompany"
                        matTooltip="{{item.contact.fullName}}" />
                    <img src="{{ item.contact.photoUrl || 'assets/images/company-icon.svg' }}"
                        class="user-thumbnail float-left mr-2" alt="" *ngIf="item.contact.isCompany" />
                </div>
                <div class="flex-grow-1">
                    <div>
                        <span class="font-focused">{{ item.contact.fullName }}</span>
                    </div>
                    <span class="badge badge-warning mr-1" *ngFor="let cat of item.contact.categories">{{
                        cat }}</span>
                    <span class="badge badge-gray mr-1" *ngFor="let cat of item.contact.searchTags">{{ cat
                        }}</span>

                </div>
            </div>
            <button mat-icon-button (click)="onDeleteAssociate(item)" matTooltip="Remove" aria-label="Remove"
                *ngIf="!isReadOnly">
                <mat-icon>close</mat-icon>
            </button>
        </div>
        <hr class="mb-0" />
        <div class="association-details">
            <h6 class="font-focused">{{item.title}}</h6>
            <mat-icon class="mr-1">email</mat-icon>
            <small class="mr-1">
                {{item.contact.primaryEmail}}</small>
            <mat-icon class="mr-1">phone</mat-icon>
            <small class="mr-1">
                {{item.contact.primaryPhone}}</small>
        </div>
    </li>
</ul>
