<div class="mat-dialog-header mcv-dialog-header">
    <h5 class="font-focused">New Stage</h5>
    <div class="d-flex align-items-center justify-content-center">
        <button mat-raised-button color="primary" aria-label="Save" (click)="onSubmit()"> Save</button>
        <button mat-icon-button aria-label="close" (click)="onClose()">
            <mat-icon>close</mat-icon>
        </button>
    </div>
</div>
<mat-dialog-content>
    <div class="form-wrapper">
        <form [formGroup]="form" autocomplete="off" novalidate>
            <div class="row m-0">

                    <mat-form-field appearance="outline" class="col-md-12">
                        <mat-label>Stage Title</mat-label>
                        <input matInput formControlName="title" placeholder="title">
                        <mat-error>{{getErrorMessage(f.title)}}</mat-error>
                    </mat-form-field>
            

                    <mat-form-field  appearance="outline" class="col-md-12">
                        <mat-label>Stage Value</mat-label>
                        <input matInput formControlName="percentage" placeholder="percentage" type="number" [min]="0" [max]="100">
                        <span matSuffix>&#37;&nbsp;</span>

                        <mat-error>{{getErrorMessage(f.percentage)}}</mat-error>
                    </mat-form-field>
            </div>
        </form>
    </div>
</mat-dialog-content>
