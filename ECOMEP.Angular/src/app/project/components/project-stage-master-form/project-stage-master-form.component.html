<div class="mat-dialog-header mcv-dialog-header">
    <h5 class="font-focused">{{data.dialogTitle}}</h5>
    <div class="d-flex align-items-center justify-content-center">
        <button mat-raised-button [color]="'primary'" class="mt-2 float-right" aria-label="Save" (click)="onSave()"
            [disabled]="loaderFlag"> Save</button>
        <button mat-icon-button aria-label="close" (click)="onClose()">
            <mat-icon>close</mat-icon>
        </button>
    </div>
</div>
<mat-dialog-content>
    <div class="form-wrapper">
        <form [formGroup]="form" autocomplete="off" novalidate>
            <div class="row m-0">

                <div class="col-md-9">
                    <mat-form-field>
                        <mat-label>Stage Title</mat-label>
                        <input matInput formControlName="title" placeholder="title">
                        <mat-error>{{getErrorMessage(f.title)}}</mat-error>
                    </mat-form-field>
                </div>

                <div class="col-md-3">
                    <mat-form-field>
                        <mat-label>Stage Value</mat-label>
                        <input matInput formControlName="percentage" placeholder="percentage" type="number">
                        <mat-icon matSuffix>%</mat-icon>
                        <mat-error>{{getErrorMessage(f.percentage)}}</mat-error>
                    </mat-form-field>
                </div>

                <!-- <div class="col-md-9">
                    <mat-form-field>
                        <mat-label>Work Order Stage Title</mat-label>
                        <input matInput formControlName="workOrderStageTitle" placeholder="workOrderStageTitle"
                            [matAutocomplete]="autoWorkOrderStage" />
    
                        <mat-autocomplete #autoWorkOrderStage="matAutocomplete">
                            <mat-option *ngFor="let option of filteredStage$ | async" [value]="option">
                                {{option}}
                            </mat-option>
                        </mat-autocomplete>
                        <mat-error>{{getErrorMessage(f.workOrderStageTitle)}}</mat-error>
                    </mat-form-field>
                </div> -->

                <!-- <div class="col-md-3">
                    <mat-form-field>
                        <mat-label>Work Order Stage Value</mat-label>
                        <input matInput formControlName="workOrderStageValue" placeholder="workOrderStageValue"
                            type="number">
                        <mat-icon matSuffix>%</mat-icon>
                        <mat-error>{{getErrorMessage(f.workOrderStageValue)}}</mat-error>
                    </mat-form-field>
                </div> -->

                <div class="col-md-4">
                    <mat-form-field>
                        <mat-label>Typology</mat-label>
                        <mat-select formControlName="typology" multiple>
                            <mat-option *ngFor="let option of typeOptions" [value]="option">
                                {{option}}
                            </mat-option>
                        </mat-select>
                        <mat-error>{{getErrorMessage(f.typology)}}</mat-error>
                    </mat-form-field>
                </div>
            </div>
        </form>
    </div>
</mat-dialog-content>
