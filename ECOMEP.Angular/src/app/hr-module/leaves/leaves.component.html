 <div class="table-container">

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z2 full-table">

    <!-- Employee -->
    <ng-container matColumnDef="employee">
      <th mat-header-cell *matHeaderCellDef> Employee </th>
      <td mat-cell *matCellDef="let element">

        <div class="emp-cell">
          <img
            [src]="element.contact?.photoUrl || 'assets/images/user.png'"
            [matTooltip]="element.contact?.name"
            class="user-img"
          />

          <span>{{ element.contact.name }}</span>
        </div>

      </td>
    </ng-container>

    <!-- Type -->
    <ng-container matColumnDef="type">
      <th mat-header-cell *matHeaderCellDef> Leave Type </th>
      <td mat-cell *matCellDef="let element">
        {{ element.typeValue }}
      </td>
    </ng-container>

    <!-- Dates -->
    <ng-container matColumnDef="dates">
      <th mat-header-cell *matHeaderCellDef> Dates </th>
      <td mat-cell *matCellDef="let element">
        {{ element.start | date:'dd MMM yyyy' }}
        →
        {{ element.end | date:'dd MMM yyyy' }}
      </td>
    </ng-container>

    <!-- Total -->
    <ng-container matColumnDef="total">
      <th mat-header-cell *matHeaderCellDef> Days </th>
      <td mat-cell *matCellDef="let element">
        {{ element.total }}
      </td>
    </ng-container>

    <!-- Status -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let element">

        <mat-icon *ngIf="element.statusFlag === 0" style="color:#f3c807;">
          help
        </mat-icon>

        <mat-icon *ngIf="element.statusFlag === 1" style="color:#4CAF50;">
          check_circle
        </mat-icon>

        <mat-icon *ngIf="element.statusFlag === -1" style="color:red;">
          cancel
        </mat-icon>

      </td>
    </ng-container>

    <!-- Header -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <!-- Rows -->
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

</div>
