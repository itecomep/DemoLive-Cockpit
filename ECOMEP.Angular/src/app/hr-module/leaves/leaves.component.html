<div class="table-container">

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z2 full-table">

    <!-- Employee -->
    <ng-container matColumnDef="employee">
      <th mat-header-cell *matHeaderCellDef> Employee </th>
      <td mat-cell *matCellDef="let element">
        <div class="emp-cell">
          <img
            [src]="'assets/images/user.png'"
            [matTooltip]="element.employeeName"
            class="user-img"
          />
          <span>{{ element.employeeName }}</span>
        </div>
      </td>
    </ng-container>

    <!-- Reason -->
    <ng-container matColumnDef="reason">
      <th mat-header-cell *matHeaderCellDef> Reason </th>
      <td mat-cell *matCellDef="let element">
        {{ element.reason || '-' }}
      </td>
    </ng-container>

    <!-- Leave Type -->
    <ng-container matColumnDef="type">
      <th mat-header-cell *matHeaderCellDef> Leave Type </th>
      <td mat-cell *matCellDef="let element">
        {{ element.type }}
      </td>
    </ng-container>

    <!-- Start Date -->
    <ng-container matColumnDef="start">
      <th mat-header-cell *matHeaderCellDef> Start Date </th>
      <td mat-cell *matCellDef="let element">
        {{ element.start | date:'dd MMM yyyy' }}
      </td>
    </ng-container>

    <!-- End Date -->
    <ng-container matColumnDef="end">
      <th mat-header-cell *matHeaderCellDef> End Date </th>
      <td mat-cell *matCellDef="let element">
        {{ element.end | date:'dd MMM yyyy' }}
      </td>
    </ng-container>

    <!-- Days -->
    <ng-container matColumnDef="total">
      <th mat-header-cell *matHeaderCellDef> Days </th>
      <td mat-cell *matCellDef="let element">
        {{ element.total }}
      </td>
    </ng-container>

    <!-- Status -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let element">

        <!-- Pending -->
        <mat-icon *ngIf="element.statusFlag === 0"
                  style="color:#f3c807;"
                  matTooltip="Pending">
          help
        </mat-icon>

        <!-- Approved -->
        <mat-icon *ngIf="element.statusFlag === 1"
                  style="color:#4CAF50;"
                  matTooltip="Approved">
          check_circle
        </mat-icon>

        <!-- Rejected -->
        <mat-icon *ngIf="element.statusFlag === -1"
                  style="color:red;"
                  matTooltip="Rejected">
          cancel
        </mat-icon>

      </td>
    </ng-container>

    <!-- Attachment -->
    <ng-container matColumnDef="attachment">
      <th mat-header-cell *matHeaderCellDef> Attachment </th>
      <td mat-cell *matCellDef="let element">

        <a *ngIf="element.attachmentUrl"
           [href]="element.attachmentUrl"
           target="_blank"
           matTooltip="View Attachment">

          <mat-icon style="cursor:pointer;">attach_file</mat-icon>
        </a>

        <span *ngIf="!element.attachmentUrl">-</span>

      </td>
    </ng-container>

    <!-- Header -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <!-- Rows -->
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

</div>
