<div class="holiday-list-wrapper">

  <h2 class="page-title">Holiday List</h2>

  <table>

    <thead>
      <tr>
        <th>Index</th>
        <th>Holiday Date</th>
        <th>Title</th>
      </tr>
    </thead>

    <tbody>

      <tr *ngFor="let item of holidaysMasterArr; let i = index">

        <td>{{ i + 1 }}</td>

        <td>
          {{ item.holidayDate | date:'dd MMM yyyy' }}
        </td>

        <td>
          {{ item.title }}
        </td>

      </tr>

    </tbody>

  </table>

</div>
