 <div class="meetings-container">

  <!-- ✅ HEADER (WFH STYLE) -->
  <div class="table-header">
    <h2>Meetings Module</h2>

    
    <!-- Right side summary -->
    <div class="total-box">
      <label>Total Meetings</label>
      <h3>{{ meetings.length }}</h3>
    </div>
  </div>



  <div class="filter-bar">

  <input
    type="text"
    placeholder="Search Staff..."
    [(ngModel)]="filters.staffName"
    (input)="applyFilters()"
  />

  <input
    type="date"
    [(ngModel)]="filters.startDate"
    (change)="applyFilters()"
  />

  <button (click)="resetFilters()">Reset</button>

</div>

  <!-- TABLE -->
  <table class="meetings-table">

    <thead>
      <tr>
        <th>Staff Name</th>
        <th>Date</th>
        <th>Title</th>
        <th>Project</th>
        <th>Purpose</th>
        <th>Location</th>
        <th>Meeting Hours</th>
        <th>Total</th>
      </tr>
    </thead>

    <tbody>
      <!-- <tr *ngFor="let m of meetings"> -->
        <tr *ngFor="let m of filteredMeetings">

        <td><b>{{ m.createdBy }}</b></td>

        <td>{{ m.startDate | date:'dd MMM y' }}</td>

        <td>{{ m.title }}</td>

        <td>{{ m.project?.title }}</td>

        <td>{{ m.purpose }}</td>

        <td>{{ m.location }}</td>

        <td>{{ getMeetingHours(m) }} hrs</td>

        <td>
          <b>{{ getMeetingHours(m) }} hrs</b>
        </td>

      </tr>
    </tbody>

  </table>

</div>
