<div class="mat-dialog-header mcv-dialog-header">
  <h5 class="font-focused">{{data.dialogTitle}}</h5>
  <button mat-icon-button aria-label="close" (click)="onClose(null)">
    <mat-icon>close</mat-icon>
  </button>
</div>
<mat-dialog-content>
  <mcv-time-line-event-detail [event]="data.event" (afterSelect)="onSelect($event)" (afterCancel)="onClose($event)"
    *ngIf="data"></mcv-time-line-event-detail>
</mat-dialog-content>
