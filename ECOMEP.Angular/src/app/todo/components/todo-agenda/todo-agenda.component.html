<form
  [formGroup]="form"
  autocomplete="off"
  novalidate
  *ngIf="!isReadOnly"
  (keydown.enter)="onCreate(); $event.preventDefault()"
>
  <mat-form-field appearance="outline" class="col-md-12">
    <mat-label>Enter checklist item</mat-label>

    <input
      matInput
      placeholder="Enter checklist item here"
      formControlName="title"
    />

    <button
      mat-icon-button
      matSuffix
      (click)="onCreate()"
      color="accent"
      matTooltip="Add"
      type="button"
    >
      <mat-icon>add</mat-icon>
    </button>

    <mat-error>{{ getErrorMessage(f.title) }}</mat-error>
  </mat-form-field>
</form>

<div class="checklist-scroll">
  <ul class="todo-agenda" style="list-style: none; padding: 0;">
    <li *ngFor="let item of filteredAgenda; let i=index">

      <!-- CATEGORY HEADER -->
      <div 
        *ngIf="i === 0 || getGroupKey(filteredAgenda[i-1].title) !== getGroupKey(item.title)"
        class="category-group-header"
        style="padding: 15px 5px 5px 0; border-bottom: 2px solid #f0f0f0;"
      >
        <h6 class="text-primary mb-0" style="font-size: 0.75rem; font-weight: 700;">
          <mat-icon style="font-size: 14px;">folder</mat-icon>

          {{ getStage(item.title) }} → {{ getCategoryOnly(item.title) }}

          <span style="margin-left: 6px; color: #777;">
            ({{ getCategoryTotalCount(getCategory(item.title)) }})
          </span>
        </h6>
      </div>

      <!-- ITEM -->
      <div class="d-flex justify-content-between align-items-center" style="padding: 8px 0 8px 10px;">

        <div class="d-flex align-items-center flex-grow-1">

          <mat-checkbox
            class="mr-2"
            [checked]="item.statusFlag == 1"
            (change)="onChecked(item)"
            [disabled]="!isCheckboxMode"
          ></mat-checkbox>

          <span style="font-weight: 700; margin-right: 6px;">
            {{ getItemNumber(i) }}.
          </span>

          <span [class.text-strikethrough]="item.statusFlag == 1">
            {{ getItemOnly(item.title) }}
          </span>

        </div>

        <button
          mat-icon-button
          (click)="onDelete(item)"
          *ngIf="!isReadOnly && !isCheckboxMode"
        >
          <mat-icon style="color: red;">delete_outline</mat-icon>
        </button>

      </div>

    </li>
  </ul>
</div>
